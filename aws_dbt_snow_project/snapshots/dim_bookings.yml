snapshots:
    - name: dim_bookings
      relation: ref('bookings')  #refres to bookings.sql in gold/ephemeral folder
      config:
        schema: gold
        database: AIRBNB_DUMP
        unique_key: BOOKING_ID
        strategy: timestamp
        updated_at: CREATED_AT
        dbt_valid_to_current: "to_date('9999-12-31')"


