snapshots:
    - name: dim_listings
      relation: ref('listings') #refers to listings.sql in gold/ephemeral folder
      config:
        schema: gold
        database: AIRBNB_DUMP
        unique_key: LISTING_ID
        strategy: timestamp
        updated_at: LISTING_CREATED_AT
        dbt_valid_to_current: "to_date('9999-12-31')"

