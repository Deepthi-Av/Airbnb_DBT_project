snapshots:
    - name: dim_hosts
      relation: ref('hosts') #refers to hosts.sql in gold/ephemeral folder
      config:
        schema: gold
        database: AIRBNB_DUMP
        unique_key: HOST_ID
        strategy: timestamp
        updated_at: HOST_CREATED_AT
        dbt_valid_to_current: "to_date('9999-12-31')"

    